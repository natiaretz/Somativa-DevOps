<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo dos 5 Erros</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css">

  <!-- Ícone da aba -->
  <link rel="icon" href="img/icon.png">
</head>
<body>
  <!-- TELA 1: INICIO -->
  <div class="screen start-screen on" id="s1">
    <div class="start-frame">
      <button class="start-btn" onclick="startGame()">jogar</button>
    </div>
  </div>

  <!-- TELA 2: JOGO -->
  <div class="screen game-screen" id="s2">
    <h2>Encontre os 5 erros entre as imagens</h2>
    <div class="dots" id="dots"></div>

    <div class="images">
      <div class="wrap">
        <canvas id="c1"></canvas>
        <div class="lbl">Imagem 1</div>
      </div>

      <div class="wrap">
        <canvas id="c2"></canvas>
        <div class="lbl">Imagem 2</div>
      </div>
    </div>

    <div class="timer-lbl">Tempo: <span id="tNum">1:00</span></div>
    <div class="bar-bg">
      <div class="bar" id="bar"></div>
    </div>
  </div>

  <!-- TELA 3: RESULTADO -->
  <div class="screen result-screen" id="s3">
    <div class="result-frame">
      <div class="result-panel">
        <h1 id="rTitle" class="result-title"></h1>
        <div class="stars" id="rStars"></div>

        <div class="stats">
          <div class="stat">
            <b id="rFound"></b>
            <span>Erros encontrados</span>
          </div>

          <div class="stat">
            <b id="rTime"></b>
            <span>Tempo restante</span>
          </div>
        </div>

        <button class="glass-btn result-btn" onclick="goStart()">Jogar Novamente</button>
      </div>
    </div>
  </div>

  <script src="js/javascript.js"></script>
</body>
</html>
